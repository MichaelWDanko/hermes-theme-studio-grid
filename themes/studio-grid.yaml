name: studio-grid
label: Studio Grid
description: Light white/navy dashboard theme with crisp cards, blue grid accents, and high-contrast analytics.

palette:
  background:
    hex: "#f7faff"
    alpha: 1
  midground:
    hex: "#0b1f3a"
    alpha: 1
  foreground:
    hex: "#2563eb"
    alpha: 0.18
  warmGlow: "rgba(37, 99, 235, 0.12)"
  noiseOpacity: 0

typography:
  fontSans: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
  fontMono: "JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
  fontDisplay: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
  fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
  baseSize: "14px"
  lineHeight: "1.55"
  letterSpacing: "-0.01em"

layout:
  radius: "0.875rem"
  density: comfortable

colorOverrides:
  card: "#ffffff"
  cardForeground: "#0b1f3a"
  popover: "#ffffff"
  popoverForeground: "#0b1f3a"
  primary: "#0b1f3a"
  primaryForeground: "#ffffff"
  secondary: "#eef4ff"
  secondaryForeground: "#12345f"
  muted: "#eef4ff"
  mutedForeground: "#64748b"
  accent: "#dbeafe"
  accentForeground: "#0b1f3a"
  success: "#16a34a"
  warning: "#d97706"
  destructive: "#dc2626"
  destructiveForeground: "#ffffff"
  border: "#d7e3f4"
  input: "#c9d8ee"
  ring: "#2563eb"

assets:
  bg: "none"

componentStyles:
  card:
    background: "linear-gradient(180deg, #ffffff 0%, #fbfdff 100%)"
    boxShadow: "0 18px 45px rgba(11, 31, 58, 0.08), 0 1px 0 rgba(255, 255, 255, 0.85) inset"
  sidebar:
    background: "linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(241,247,255,0.95) 100%)"
  header:
    background: "rgba(255,255,255,0.92)"
  backdrop:
    fillerOpacity: "0"
    fillerBlendMode: "normal"
  page:
    background: "#f7faff"

customCSS: |
  :root {
    color-scheme: light;
  }

  body,
  #root {
    background: #f7faff !important;
  }

  #root > div {
    background:
      linear-gradient(rgba(37, 99, 235, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37, 99, 235, 0.035) 1px, transparent 1px),
      radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 34rem),
      #f7faff !important;
    background-size: 32px 32px, 32px 32px, auto, auto !important;
    color: #0b1f3a !important;
    text-transform: none !important;
  }

  [aria-hidden="true"][class*="fixed"][class*="inset-0"] {
    mix-blend-mode: normal !important;
  }

  aside[aria-label="Navigation"] {
    color: #0b1f3a !important;
    border-right: 1px solid #d7e3f4 !important;
    box-shadow: 12px 0 36px rgba(11, 31, 58, 0.06);
  }

  aside[aria-label="Navigation"] * {
    mix-blend-mode: normal !important;
  }

  aside[aria-label="Navigation"] a,
  aside[aria-label="Navigation"] button {
    color: #12345f !important;
    border-radius: 0.75rem;
    margin: 0.1rem 0.65rem;
    padding-left: 0.9rem !important;
    padding-right: 0.9rem !important;
  }

  aside[aria-label="Navigation"] a[aria-current="page"] {
    background: #0b1f3a !important;
    color: #ffffff !important;
    box-shadow: 0 8px 18px rgba(11, 31, 58, 0.18);
  }

  aside[aria-label="Navigation"] a[aria-current="page"] svg,
  aside[aria-label="Navigation"] a[aria-current="page"] span {
    color: #ffffff !important;
  }

  h1, h2, h3,
  [class*="font-mondwest"],
  [class*="font-bold"] {
    font-family: var(--theme-font-display) !important;
    letter-spacing: -0.02em !important;
  }

  main,
  section,
  [class*="bg-card"] {
    color: #0b1f3a;
  }

  [class*="bg-card"],
  [class*="border-border"] {
    border-color: #d7e3f4 !important;
  }

  [class*="bg-card"] {
    background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%) !important;
    box-shadow: 0 18px 45px rgba(11, 31, 58, 0.08), 0 1px 0 rgba(255,255,255,0.9) inset;
  }

  button,
  [role="button"] {
    text-transform: none !important;
  }

  button[class*="bg-primary"],
  [aria-pressed="true"],
  [data-state="active"] {
    background: #0b1f3a !important;
    color: #ffffff !important;
    border-color: #0b1f3a !important;
  }

  .text-muted-foreground,
  [class*="text-muted-foreground"] {
    color: #52657d !important;
  }

  [class*="bg-[#ffe6cb]"] {
    background-color: #2563eb !important;
  }

  [class*="text-[#ffe6cb]"] {
    color: #1d4ed8 !important;
  }

  [class*="bg-emerald-500"],
  [class*="bg-emerald-500/70"] {
    background-color: #14b8a6 !important;
  }

  [class*="text-emerald-400"] {
    color: #0f766e !important;
  }

  .recharts-cartesian-grid line {
    stroke: #d7e3f4 !important;
  }

  .recharts-bar-rectangle path,
  .recharts-bar-rectangle rect {
    fill: #2563eb !important;
  }

  .recharts-line path {
    stroke: #14b8a6 !important;
  }
